name: Release readiness

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  metadata-and-archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whitespace
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="$BASE_SHA"
          elif [[ -n "$BEFORE_SHA" && ! "$BEFORE_SHA" =~ ^0+$ ]]; then
            base="$BEFORE_SHA"
          else
            base="$(git rev-list --max-parents=0 HEAD)"
          fi
          echo "Checking whitespace between $base and HEAD"
          git diff --check "$base" HEAD

      - name: Check version metadata
        run: python3 scripts/check_release_metadata.py

      - name: Create source archive
        run: git archive --format=zip --prefix=PicoMesh/ --output=PicoMesh-source.zip HEAD

      - name: Check source archive
        run: python3 scripts/check_source_archive.py PicoMesh-source.zip

      - name: Upload source archive candidate
        uses: actions/upload-artifact@v7
        with:
          name: picomesh-source-candidate
          path: PicoMesh-source.zip
          if-no-files-found: error
          retention-days: 14

  arduino-source-archive:
    needs: metadata-and-archive
    runs-on: ubuntu-latest
    steps:
      - name: Download source candidate
        uses: actions/download-artifact@v4
        with:
          name: picomesh-source-candidate

      - name: Install archived library
        run: |
          mkdir -p "$HOME/Arduino/libraries"
          unzip -q PicoMesh-source.zip -d "$HOME/Arduino/libraries"
          test -f "$HOME/Arduino/libraries/PicoMesh/library.properties"
          test -f "$HOME/Arduino/libraries/PicoMesh/src/PicoMesh.h"

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install UNO R4 core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:renesas_uno

      - name: Compile archived examples
        shell: bash
        run: |
          for sketch in \
            ArduinoHeartbeatNode \
            ArduinoHeartbeatController \
            ArduinoMultiNodeController \
            ArduinoReliableCommandController
          do
            echo "Compiling $sketch from source archive"
            arduino-cli compile \
              --fqbn arduino:renesas_uno:minima \
              "$HOME/Arduino/libraries/PicoMesh/examples/$sketch"
          done
