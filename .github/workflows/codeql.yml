name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 3 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
      - name: Configure
        run: cmake -S . -B build-codeql -DCMAKE_BUILD_TYPE=Debug -DPICOMESH_BUILD_TESTS=ON -DPICOMESH_BUILD_EXAMPLES=ON
      - name: Build
        run: cmake --build build-codeql --parallel
      - uses: github/codeql-action/analyze@v3
