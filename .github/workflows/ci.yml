name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DPICOMESH_BUILD_TESTS=ON -DPICOMESH_BUILD_EXAMPLES=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Install
        run: cmake --install build --prefix install
      - name: Configure installed-package consumer
        run: cmake -S tests/cmake_consumer -B consumer-build -DCMAKE_PREFIX_PATH="${{ github.workspace }}/install"
      - name: Build installed-package consumer
        run: cmake --build consumer-build --parallel

  warnings-as-errors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        env:
          CXXFLAGS: -Werror
        run: cmake -S . -B build-strict -DPICOMESH_BUILD_TESTS=ON -DPICOMESH_BUILD_EXAMPLES=ON
      - name: Build
        run: cmake --build build-strict --parallel
      - name: Test
        run: ctest --test-dir build-strict --output-on-failure
