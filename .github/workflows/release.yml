name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate-host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DPICOMESH_BUILD_TESTS=ON -DPICOMESH_BUILD_EXAMPLES=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-pico:
    strategy:
      fail-fast: false
      matrix:
        board: [pico, pico2]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-arm-none-eabi libnewlib-arm-none-eabi
      - name: Fetch Pico SDK 2.3.0
        run: |
          git clone --depth 1 --branch 2.3.0 https://github.com/raspberrypi/pico-sdk.git "$RUNNER_TEMP/pico-sdk"
          git -C "$RUNNER_TEMP/pico-sdk" submodule update --init --depth 1
      - name: Configure
        env:
          PICO_SDK_PATH: ${{ runner.temp }}/pico-sdk
        run: cmake -S examples/PicoSdkI2cNode -B build-pico -DPICO_BOARD=${{ matrix.board }}
      - name: Build
        run: cmake --build build-pico --parallel
      - name: Collect firmware
        shell: bash
        run: |
          mkdir -p dist
          cp build-pico/picomesh_pico_i2c_node.uf2 "dist/picomesh-i2c-node-${{ matrix.board }}.uf2"
          cp build-pico/picomesh_pico_i2c_node.elf "dist/picomesh-i2c-node-${{ matrix.board }}.elf"
      - uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: dist/
          if-no-files-found: error

  publish:
    needs: [validate-host, build-pico]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Create source packages
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          git archive --format=zip --prefix="PicoMesh-${version}/" --output="dist/PicoMesh-${version}.zip" HEAD
          git archive --format=tar.gz --prefix="PicoMesh-${version}/" --output="dist/PicoMesh-${version}.tar.gz" HEAD
          sha256sum dist/* > dist/SHA256SUMS.txt
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
