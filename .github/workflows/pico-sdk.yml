name: Pico SDK

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        board: [pico, pico2]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Fetch Pico SDK 2.3.0
        run: |
          git clone --depth 1 --branch 2.3.0 https://github.com/raspberrypi/pico-sdk.git "$RUNNER_TEMP/pico-sdk"
          git -C "$RUNNER_TEMP/pico-sdk" submodule update --init --depth 1

      - name: Configure
        env:
          PICO_SDK_PATH: ${{ runner.temp }}/pico-sdk
        run: cmake -S examples/PicoSdkI2cNode -B build-pico -DPICO_BOARD=${{ matrix.board }}

      - name: Build
        run: cmake --build build-pico --parallel

      - name: Report firmware size
        shell: bash
        run: |
          elf="$(find build-pico -type f -name 'picomesh_pico_i2c_node.elf' -print -quit)"
          test -n "$elf"
          echo "Board: ${{ matrix.board }}" | tee "firmware-size-${{ matrix.board }}.txt"
          echo "ELF: $elf" | tee -a "firmware-size-${{ matrix.board }}.txt"
          arm-none-eabi-size "$elf" | tee -a "firmware-size-${{ matrix.board }}.txt"

      - name: Collect firmware outputs
        shell: bash
        run: |
          mkdir -p "firmware-${{ matrix.board }}"
          find build-pico -type f \( -name '*.uf2' -o -name '*.elf' \) \
            -exec cp {} "firmware-${{ matrix.board }}/" \;
          cp "firmware-size-${{ matrix.board }}.txt" "firmware-${{ matrix.board }}/"
          find "firmware-${{ matrix.board }}" -type f -maxdepth 1 -print

      - name: Upload firmware and size report
        uses: actions/upload-artifact@v7
        with:
          name: picomesh-${{ matrix.board }}-firmware
          path: firmware-${{ matrix.board }}
          if-no-files-found: error
          retention-days: 14
