name: Feature request
description: Propose a reusable PicoMesh capability
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Describe the embedded or distributed-system problem.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Target platform or transport
